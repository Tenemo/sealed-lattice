name: ci

on:
    push:
        branches:
            - master
    pull_request:

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    SEALED_LATTICE_TURBO_CACHE: 'local:,remote:'

jobs:
    verify:
        name: verify
        runs-on: ubuntu-latest
        timeout-minutes: 35
        steps:
            - uses: actions/checkout@v6.0.2
            - uses: ./.github/actions/bootstrap-pnpm
            - uses: dtolnay/rust-toolchain@stable
              with:
                  targets: wasm32-unknown-unknown
            - run: pnpm run check
            - run: pnpm run test:node
            - run: pnpm run build

    coverage:
        name: coverage
        runs-on: ubuntu-latest
        timeout-minutes: 25
        steps:
            - uses: actions/checkout@v6.0.2
            - uses: ./.github/actions/bootstrap-pnpm
            - uses: dtolnay/rust-toolchain@stable
              with:
                  targets: wasm32-unknown-unknown
            - run: pnpm run coverage:node

    browser:
        name: browser
        runs-on: macos-latest
        timeout-minutes: 45
        steps:
            - uses: actions/checkout@v6.0.2
            - uses: ./.github/actions/bootstrap-pnpm
            - uses: dtolnay/rust-toolchain@stable
              with:
                  targets: wasm32-unknown-unknown
            - run: pnpm exec playwright install --with-deps chromium firefox webkit
            - run: pnpm run test:browser

    docs:
        name: docs
        runs-on: ubuntu-latest
        timeout-minutes: 25
        steps:
            - uses: actions/checkout@v6.0.2
            - uses: ./.github/actions/bootstrap-pnpm
            - run: pnpm run verify:docs
            - run: pnpm run docs:build:site

    release-smoke:
        name: release smoke
        if: github.event_name == 'pull_request'
        runs-on: ubuntu-latest
        timeout-minutes: 60
        steps:
            - uses: actions/checkout@v6.0.2
            - uses: ./.github/actions/bootstrap-pnpm
            - uses: dtolnay/rust-toolchain@stable
              with:
                  targets: wasm32-unknown-unknown
            - run: pnpm run build
            - run: pnpm run verify:docs
            - run: pnpm run docs:build:site
            - run: pnpm run smoke:pack
            - run: pnpm run smoke:pack:npm
            - run: cd packages/sdk && npm pack --dry-run --ignore-scripts
